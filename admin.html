<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard ✨ | ระบบจัดการ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            border: 4px solid #ffffff;
        }
        .search-bar {
            transition: all 0.3s ease;
        }
        .search-bar:focus {
            transform: scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(251, 191, 36, 0.3);
        }
        .btn-action {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-action:hover {
            transform: translateY(-3px) scale(1.05);
        }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <!-- Header Section -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-3xl font-bold text-amber-900 flex items-center justify-center md:justify-start">
                    🐥 Admin Dashboard
                </h1>
                <p class="text-amber-700 opacity-80">ตรวจสอบสถิติการเข้าแถวสะสม</p>
            </div>
            
            <!-- ปุ่มควบคุมด้านบน -->
            <div class="flex gap-3 flex-wrap justify-center">
                <!-- *** ใส่ URL Google Sheets ของคุณตรงช่อง href *** -->
                <a href="https://docs.google.com/spreadsheets/d/1J_L1zC29-fo7H2PQM8b3cvcA35pRTmrjRW8rp32Lxew/edit?gid=0#gid=0" 
                   target="_blank" 
                   class="btn-action bg-emerald-500 text-white px-5 py-3 rounded-2xl font-bold shadow-md flex items-center hover:bg-emerald-600">
                    <span class="mr-2">📊</span> ไปที่ Sheets
                </a>
                
                <a href="index.html" 
                   class="btn-action bg-white text-amber-600 px-5 py-3 rounded-2xl font-bold shadow-md border border-amber-200 hover:bg-amber-50">
                    ⬅️ หน้าเช็คชื่อ
                </a>
            </div>
        </header>

        <!-- Search & Info Bar -->
        <div class="mb-6 flex flex-col md:flex-row gap-4">
            <div class="relative flex-1">
                <input type="text" id="search" onkeyup="filterNames()" placeholder="ค้นหาชื่อนักเรียน..." 
                    class="search-bar w-full px-6 py-4 rounded-3xl border-none outline-none text-amber-900 font-medium shadow-md pr-12">
                <span class="absolute right-5 top-4 opacity-30">🔍</span>
            </div>
            <div class="bg-amber-100 px-8 py-4 rounded-3xl border border-amber-200 text-amber-800 font-bold flex items-center justify-center shadow-sm">
                นักเรียน 31 คน
            </div>
        </div>

        <!-- Main Content -->
        <main class="glass p-6 md:p-10 shadow-2xl overflow-hidden border-4 border-white/50">
            <div class="flex justify-between items-center mb-8 border-b border-amber-100 pb-4">
                <h2 class="text-xl font-bold text-amber-800 flex items-center">
                    <span class="mr-2">📋</span> สรุปยอดสะสม
                </h2>
                <button onclick="loadData()" class="btn-action text-amber-500 font-bold flex items-center hover:text-amber-600">
                    <span id="refresh-icon" class="mr-1">🔄</span> รีเฟรชข้อมูล
                </button>
            </div>
            
            <!-- รายชื่อนักเรียน -->
            <div id="admin-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="col-span-full text-center text-amber-600 py-20">
                    <p class="animate-pulse text-lg font-medium">🐣 กำลังฟักข้อมูลจาก Google Sheets...</p>
                </div>
            </div>
        </main>
        
        <footer class="text-center mt-10 text-amber-900/40 text-sm">
            Smart Attendance Admin System v2.0
        </footer>
    </div>

    <script>
        // ใช้ URL เว็บแอปของคุณที่ได้จากการ Deploy ล่าสุด
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtq1xqN6vJVaGdybzzzjODQiTO5yDY2UmbmlzJonixRyAIuFWXqiB0EIIQWer48nIT/exec";

        async function loadData() {
            const list = document.getElementById('admin-list');
            const refreshIcon = document.getElementById('refresh-icon');
            
            // เพิ่มแอนิเมชันหมุนที่ปุ่มรีเฟรช
            refreshIcon.classList.add('animate-spin');
            
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                window.studentData = data; 
                renderData(data);
            } catch (e) {
                list.innerHTML = `
                    <div class="col-span-full text-center py-10 bg-red-50 rounded-3xl border-2 border-red-100">
                        <p class="text-red-500 font-bold">❌ โหลดข้อมูลไม่สำเร็จ</p>
                        <p class="text-red-400 text-sm mt-2">กรุณาตรวจสอบสิทธิ์การ Deploy Apps Script (ต้องเป็น Anyone)</p>
                    </div>`;
            } finally {
                refreshIcon.classList.remove('animate-spin');
            }
        }

        function renderData(data) {
            const list = document.getElementById('admin-list');
            list.innerHTML = "";
            
            if (data.length === 0) {
                list.innerHTML = "<p class='col-span-full text-center text-amber-600 py-10'>ไม่พบข้อมูลนักเรียน</p>";
                return;
            }
            
            data.forEach(item => {
                const isWarn = item.total >= 6; // เงื่อนไขการแจ้งเตือน
                const div = document.createElement('div');
                div.className = `flex justify-between items-center p-5 rounded-3xl border-2 transition-all duration-300 ${isWarn ? 'bg-red-50 border-red-200 shadow-md scale-[1.02]' : 'bg-white border-amber-50 hover:border-amber-200'}`;
                
                div.innerHTML = `
                    <div class="flex flex-col">
                        <span class="font-bold text-lg ${isWarn ? 'text-red-600' : 'text-amber-900'}">${item.name}</span>
                        <div class="flex items-center mt-1">
                            <span class="${isWarn ? 'bg-red-500' : 'bg-green-500'} w-2 h-2 rounded-full mr-2"></span>
                            <span class="text-xs ${isWarn ? 'text-red-400 font-bold' : 'text-gray-400'} uppercase">
                                ${isWarn ? '🚨 เกินกำหนด 6 ครั้ง!' : 'สถานะปกติ'}
                            </span>
                        </div>
                    </div>
                    <div class="${isWarn ? 'bg-red-100' : 'bg-amber-100'} px-5 py-2 rounded-2xl text-center shadow-inner min-w-[70px]">
                        <span class="text-2xl font-black ${isWarn ? 'text-red-600' : 'text-amber-600'}">${item.total || 0}</span>
                        <span class="text-[10px] ${isWarn ? 'text-red-500' : 'text-amber-700'} block font-bold uppercase">ครั้ง</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function filterNames() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = window.studentData.filter(item => item.name.toLowerCase().includes(query));
            renderData(filtered);
        }

        // โหลดข้อมูลทันทีเมื่อเปิดหน้า
        loadData();
    </script>
</body>
</html>
