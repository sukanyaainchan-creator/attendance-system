<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance ✨ | ระบบเช็คชื่อ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 2.5rem; border: 4px solid #ffffff; }
        .animate-pop { animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.9; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="py-10 px-4">

    <div id="app-section" class="max-w-3xl mx-auto">
        <header class="text-center mb-10">
            <div class="flex justify-end items-center mb-6">
                <a href="admin.html" class="text-amber-700 text-sm font-bold hover:underline">⚙️ สำหรับ Admin (ดูสถิติสะสม)</a>
            </div>
            
            <div class="inline-block bg-white p-4 rounded-full shadow-sm mb-4">
                <span class="text-4xl">🐥</span>
            </div>
            <h1 class="text-3xl font-bold text-amber-900 mb-2">Smart Check-in</h1>
            <div class="inline-flex items-center bg-amber-100 text-amber-800 px-4 py-2 rounded-2xl font-medium border border-amber-200">
                <span class="mr-2">📅</span>
                <span id="thai-date"></span>
            </div>
        </header>

        <main class="glass overflow-hidden pb-10 shadow-2xl border-4 border-white">
            <div class="bg-amber-400 p-6 text-center text-white">
                <h2 class="text-xl font-bold tracking-wide text-white">รายชื่อนักเรียน (32 คน)</h2>
            </div>
            <div id="student-list" class="p-4 md:p-8 space-y-4"></div>
        </main>

        <div class="fixed bottom-10 left-0 right-0 flex justify-center px-4">
            <button onclick="submitAttendance()" id="submit-btn" 
                class="bg-gradient-to-r from-amber-400 to-orange-500 text-white text-xl font-bold py-5 px-14 rounded-full shadow-2xl transition-all hover:scale-105 active:scale-95 flex items-center space-x-3">
                <span id="submit-btn-text">บันทึกข้อมูลทั้งหมด ✨</span>
            </button>
        </div>
    </div>

    <script>
        // อัปเดตท่อส่งข้อมูลเป็นเวอร์ชันล่าสุดของคุณสุกัญญาเรียบร้อยแล้วค่ะ
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDPywUD_CsoRfrglJoAizcZvMqWOmAGQJEWFHhJdJBuMyCnKtcFcC6iM9g9Ll1R7Ntrg/exec";
        const students = ["นายเจษฎา ใจอินทร์", "นายภาคภูมิ จันทร์สี", "นายอนุวัฒน์ อ่อนกระโทก", "นางสาวกชนันท์ ธุมา", "นางสาวกมลวรรณ พันทอง", "นางสาวดวงกมล ปวุตตานนท์", "นางสาวขวัญจิรา อินทะนิล", "นางสาวพรพิมล นวลงิ้ว", "นางสาวฟ้าใส ยืนยง", "นางสาววรางคณา โฉมศรี", "นางสาวศศิณา สุวรรณประทีป", "นางสาวสุกัญญา อินจันทร์", "นางสาวสุภาพร ดาวเรือง", "นางสาวเสาวลักษณ์ คำดี", "นางสาวหยาดนรินทร์ เพชรนิล", "นางสาวอรพรรณ เพ็ญเขตร์กร", "นายปรเมธ เสียงเสนาะ", "นายตะวันส่อง ศิริเวช", "นายพิชิต ชัยเกตุ", "นายรัชพล บุญสำรี", "นายธีรพัฒ สังข์เดช", "นายพีรพัฒน์ ไกกาศ", "นางสาวชนัญชิดา โสภาพล", "นางสาวภาวิดา เทวรักษ์ษากูล", "นางสาวบุษกร ศุภลักษณ์", "นางสาวมนัสนันท์ อ่ำเฮง", "นางสาวสุทธิกานต์ แก้วจุ้ย", "นายอชิตะ ขอนแก่น", "นายรพีภัทร อยู่ดี", "นายธนพร ชวนทิศ", "นางสาวณัฐฑชา ภาคเพียร", "นางสาวนิศกร คงเสมา"];

        // โหลดรายชื่อนักเรียนทันทีเมื่อเปิดหน้าเว็บ
        window.onload = () => {
            const now = new Date();
            const dateStr = `วัน${["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"][now.getDay()]}ที่ ${now.getDate()} ${["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][now.getMonth()]} พ.ศ. ${now.getFullYear()+543}`;
            document.getElementById('thai-date').innerText = dateStr;

            const list = document.getElementById('student-list');
            list.innerHTML = "";
            students.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = "status-row bg-white/50 p-4 rounded-3xl flex items-center justify-between border border-amber-50 animate-pop shadow-sm";
                div.style.animationDelay = `${i * 0.04}s`;
                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="bg-amber-200 text-amber-700 w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold">${i+1}</span>
                        <span class="font-medium text-amber-900 text-sm md:text-base">${name}</span>
                    </div>
                    <select id="s-${i}" class="bg-white border-2 border-amber-100 rounded-2xl px-2 py-1 text-xs font-bold text-amber-700 outline-none focus:border-amber-400 cursor-pointer">
                        <option value="มา">✅ มา</option>
                        <option value="ขาด">❌ ขาด</option>
                        <option value="สาย">🕒 สาย</option>
                        <option value="ลากิจ">📝 ลากิจ</option>
                        <option value="ลาป่วย">🏥 ลาป่วย</option>
                    </select>
                `;
                list.appendChild(div);
            });
        };

        async function submitAttendance() {
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('submit-btn-text');
            const attendees = students.map((name, i) => ({ name: name, status: document.getElementById(`s-${i}`).value }));

            if (!confirm("บันทึกข้อมูลของนักเรียนทั้ง 32 คน? ✨")) return;

            btn.disabled = true; 
            btnText.innerText = "กำลังส่งข้อมูล... 🚀";
            
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: "attendance", date: document.getElementById('thai-date').innerText, attendees: attendees }) 
                });
                btnText.innerText = "บันทึกสำเร็จเรียบร้อย! ❤️";
                btn.classList.replace('from-amber-400', 'from-pink-400');
                btn.classList.replace('to-orange-500', 'to-pink-600');
                setTimeout(() => { location.reload(); }, 3000);
            } catch (e) { 
                alert("ล้มเหลว!"); 
                btn.disabled = false; 
                btnText.innerText = "ลองอีกครั้ง"; 
            }
        }
    </script>
</body>
</html>
