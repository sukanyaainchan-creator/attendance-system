<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance ✨ | ระบบเช็คชื่อ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-radius: 2.5rem; border: 4px solid #ffffff; }
        .animate-pop { animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.9; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }
        #app-section { display: none; } /* ซ่อนหน้าเช็คชื่อไว้ก่อน */
    </style>
</head>
<body class="py-10 px-4">

    <!-- ส่วนที่ 1: ระบบสมาชิก (Login / Signup) -->
    <div id="auth-section" class="max-w-md mx-auto glass p-8 shadow-2xl mt-10 animate-pop flex flex-col items-center">
        <div class="text-center mb-8">
            <span class="text-6xl">🔐</span>
            <h1 id="auth-title" class="text-2xl font-bold text-amber-900 mt-4">เข้าสู่ระบบ</h1>
            <p class="text-amber-700 text-sm opacity-70">กรุณาลงชื่อเข้าใช้งานเพื่อเช็คชื่อนักเรียน</p>
        </div>

        <div class="w-full space-y-4">
            <input type="text" id="user-input" placeholder="ชื่อผู้ใช้งาน (Username)" 
                class="w-full px-6 py-4 rounded-2xl border-2 border-amber-100 outline-none focus:border-amber-400 transition-all">
            <input type="password" id="pass-input" placeholder="รหัสผ่าน (Password)" 
                class="w-full px-6 py-4 rounded-2xl border-2 border-amber-100 outline-none focus:border-amber-400 transition-all">
            
            <!-- ปุ่มสำหรับ Login -->
            <div id="login-controls" class="space-y-4">
                <button onclick="handleAuth('login')" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                    เข้าสู่ระบบ ✨
                </button>
                <p class="text-center text-sm text-amber-800 cursor-pointer hover:underline" onclick="toggleAuth(false)">
                    ยังไม่มีบัญชี? สมัครสมาชิกใหม่ที่นี่
                </p>
            </div>

            <!-- ปุ่มสำหรับ Signup -->
            <div id="signup-controls" class="space-y-4 hidden">
                <button onclick="handleAuth('signup')" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                    ลงทะเบียนสมาชิก 🐣
                </button>
                <p class="text-center text-sm text-amber-800 cursor-pointer hover:underline" onclick="toggleAuth(true)">
                    มีบัญชีแล้ว? กลับไปหน้าล็อกอิน
                </p>
            </div>
        </div>
    </div>

    <!-- ส่วนที่ 2: ระบบเช็คชื่อ (App Section) -->
    <div id="app-section" class="max-w-3xl mx-auto">
        <header class="text-center mb-10">
            <div class="flex justify-between items-center mb-6">
                <div class="bg-white/50 px-4 py-2 rounded-xl text-xs font-bold text-amber-800 border border-white">
                    👤 ผู้ใช้งาน: <span id="display-user"></span>
                </div>
                <button onclick="logout()" class="text-red-500 text-sm font-bold hover:underline">🔒 ออกจากระบบ</button>
            </div>
            <div class="inline-block bg-white p-4 rounded-full shadow-sm mb-4">
                <span class="text-4xl">🐥</span>
            </div>
            <h1 class="text-3xl font-bold text-amber-900 mb-2">Smart Check-in</h1>
            <div class="inline-flex items-center bg-amber-100 text-amber-800 px-4 py-2 rounded-2xl font-medium border border-amber-200">
                <span class="mr-2">📅</span>
                <span id="thai-date"></span>
            </div>
        </header>

        <main class="glass overflow-hidden pb-10 shadow-2xl border-4 border-white">
            <div class="bg-amber-400 p-6 text-center text-white">
                <h2 class="text-xl font-bold tracking-wide text-white">รายชื่อนักเรียน (31 คน)</h2>
            </div>
            <div id="student-list" class="p-4 md:p-8 space-y-4"></div>
        </main>

        <div class="text-center mt-8 mb-24 flex flex-col items-center gap-2">
            <a href="admin.html" class="text-amber-700 font-medium hover:underline">⚙️ สำหรับ Admin (ดูสถิติสะสม)</a>
        </div>

        <div class="fixed bottom-10 left-0 right-0 flex justify-center px-4">
            <button onclick="submitAttendance()" id="submit-btn" 
                class="bg-gradient-to-r from-amber-400 to-orange-500 text-white text-xl font-bold py-5 px-14 rounded-full shadow-2xl transition-all hover:scale-105 active:scale-95 flex items-center space-x-3">
                <span id="submit-btn-text">บันทึกข้อมูลทั้งหมด ✨</span>
            </button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwtq1xqN6vJVaGdybzzzjODQiTO5yDY2UmbmlzJonixRyAIuFWXqiB0EIIQWer48nIT/exec";
        const students = ["นายเจษฎา ใจอินทร์", "นายภาคภูมิ จันทร์สี", "นายอนุวัฒน์ อ่อนกระโทก", "นางสาวกชนันท์ ธุมา", "นางสาวกมลวรรณ พันทอง", "นางสาวดวงกมล ปวุตตานนท์", "นางสาวขวัญจิรา อินทะนิล", "นางสาวพรพิมล นวลงิ้ว", "นางสาวฟ้าใส ยืนยง", "นางสาววรางคณา โฉมศรี", "นางสาวศศิณา สุวรรณประทีป", "นางสาวสุกัญญา อินจันทร์", "นางสาวสุภาพร ดาวเรือง", "นางสาวเสาวลักษณ์ คำดี", "นางสาวหยาดนรินทร์ เพชรนิล", "นางสาวอรพรรณ เพ็ญเขตร์กร", "นายปรเมธ เสียงเสนาะ", "นายตะวันส่อง ศิริเวช", "นายพิชิต ชัยเกตุ", "นายรัชพล บุญสำรี", "นายธีรพัฒ สังข์เดช", "นายพีรพัฒน์ ไกกาศ", "นางสาวชนัญชิดา โสภาพล", "นางสาวภาวิดา เทวรักษ์ษากูล", "นางสาวบุษกร ศุภลักษณ์", "นางสาวมนัสนันท์ อ่ำเฮง", "นางสาวสุทธิกานต์ แก้วจุ้ย", "นายสุริยะ ศีรนวล", "นายอชิตะ ขอนแก่น", "นายรพีภัทร อยู่ดี", "นายธนพร ชวนทิศ"];

        // --- ระบบสลับหน้า Login/Signup ---
        function toggleAuth(isLogin) {
            document.getElementById('auth-title').innerText = isLogin ? "เข้าสู่ระบบ" : "สมัครสมาชิกใหม่";
            document.getElementById('login-controls').classList.toggle('hidden', !isLogin);
            document.getElementById('signup-controls').classList.toggle('hidden', isLogin);
        }

        // --- จัดการการเข้าสู่ระบบ/สมัครสมาชิก ---
        async function handleAuth(mode) {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;

            if (!user || !pass) return alert("กรุณากรอกข้อมูลให้ครบนะคะ 🐥");

            if (mode === 'signup') {
                if(!confirm("ยืนยันการสมัครสมาชิกด้วยชื่อนี้ใช่ไหมคะ?")) return;
                try {
                    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: "signup", username: user, password: pass }) });
                    alert("สมัครสมาชิกสำเร็จ! ลองเข้าสู่ระบบดูนะคะ ✨");
                    toggleAuth(true);
                } catch (e) { alert("สมัครสมาชิกล้มเหลว!"); }
            } else {
                const btn = document.querySelector('#login-controls button');
                btn.innerText = "กำลังตรวจสอบ... ⏳";
                try {
                    const res = await fetch(`${SCRIPT_URL}?action=login&user=${user}&pass=${pass}`);
                    const data = await res.json();
                    if (data.status === "success") {
                        sessionStorage.setItem('isLoggedIn', 'true');
                        sessionStorage.setItem('currentUser', user);
                        showApp();
                    } else {
                        alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้องค่ะ ❌");
                        btn.innerText = "เข้าสู่ระบบ ✨";
                    }
                } catch (e) { alert("การเชื่อมต่อผิดพลาด!"); btn.innerText = "เข้าสู่ระบบ ✨"; }
            }
        }

        function showApp() {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('display-user').innerText = sessionStorage.getItem('currentUser');
            initAttendance();
        }

        function logout() {
            sessionStorage.clear();
            location.reload();
        }

        // --- ระบบเช็คชื่อเดิม ---
        function initAttendance() {
            const now = new Date();
            const dateStr = `วัน${["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"][now.getDay()]}ที่ ${now.getDate()} ${["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][now.getMonth()]} พ.ศ. ${now.getFullYear()+543}`;
            document.getElementById('thai-date').innerText = dateStr;

            const list = document.getElementById('student-list');
            list.innerHTML = "";
            students.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = "status-row bg-white/50 p-4 rounded-3xl flex items-center justify-between border border-amber-50 animate-pop shadow-sm";
                div.style.animationDelay = `${i * 0.04}s`;
                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="bg-amber-200 text-amber-700 w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold">${i+1}</span>
                        <span class="font-medium text-amber-900 text-sm md:text-base">${name}</span>
                    </div>
                    <select id="s-${i}" class="bg-white border-2 border-amber-100 rounded-2xl px-2 py-1 text-xs font-bold text-amber-700 outline-none focus:border-amber-400 cursor-pointer">
                        <option value="มา">✅ มา</option>
                        <option value="ขาด">❌ ขาด</option>
                        <option value="สาย">🕒 สาย</option>
                        <option value="ลากิจ">📝 ลากิจ</option>
                        <option value="ลาป่วย">🏥 ลาป่วย</option>
                    </select>`;
                list.appendChild(div);
            });
        }

        async function submitAttendance() {
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('submit-btn-text');
            const attendees = students.map((name, i) => ({ name: name, status: document.getElementById(`s-${i}`).value }));

            if (!confirm("บันทึกข้อมูลของนักเรียนทั้ง 31 คน? ✨")) return;

            btn.disabled = true; btnText.innerText = "กำลังส่งข้อมูล... 🚀";
            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: "attendance", date: document.getElementById('thai-date').innerText, attendees: attendees }) 
                });
                btnText.innerText = "บันทึกสำเร็จเรียบร้อย! ❤️";
                btn.classList.replace('from-amber-400', 'from-pink-400');
                btn.classList.replace('to-orange-500', 'to-pink-600');
                setTimeout(() => { location.reload(); }, 3000);
            } catch (e) { alert("ล้มเหลว!"); btn.disabled = false; btnText.innerText = "ลองอีกครั้ง"; }
        }

        window.onload = () => {
            if (sessionStorage.getItem('isLoggedIn') === 'true') { showApp(); }
        };
    </script>
</body>
</html>
