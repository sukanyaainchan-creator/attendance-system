<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance ✨ น่ารักสดใส</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Kanit', sans-serif; 
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%); /* พื้นหลังสีเหลืองพาสเทล */
            min-height: 100vh;
        }
        .cute-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2.5rem;
            border: 4px solid #ffffff;
            box-shadow: 0 20px 25px -5px rgba(251, 191, 36, 0.2);
        }
        .status-row {
            transition: all 0.3s ease;
        }
        .status-row:hover {
            background-color: #fffbeb;
            transform: scale(1.01);
        }
        .save-btn {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .save-btn:hover {
            transform: scale(1.1) rotate(-2deg);
            box-shadow: 0 15px 20px -5px rgba(245, 158, 11, 0.4);
        }
        /* แอนิเมชันตอนโหลดรายชื่อ */
        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 0.9; transform: scale(1.1); }
            80% { opacity: 1; transform: scale(0.89); }
            100% { opacity: 1; transform: scale(1); }
        }
        .animate-pop { animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards; }
    </style>
</head>
<body class="py-10 px-4">
    <div class="max-w-3xl mx-auto">
        <!-- Header น่ารักๆ -->
        <header class="text-center mb-10">
            <div class="inline-block bg-white p-4 rounded-full shadow-sm mb-4">
                <span class="text-4xl">🐥</span>
            </div>
            <h1 class="text-3xl font-bold text-amber-900 mb-2">Smart Check-in</h1>
            <div class="inline-flex items-center bg-amber-100 text-amber-800 px-4 py-2 rounded-2xl font-medium border border-amber-200">
                <span class="mr-2">📅</span>
                <span id="thai-date"></span>
            </div>
        </header>

        <!-- Main Card -->
        <main class="cute-card overflow-hidden pb-10">
            <div class="bg-amber-400 p-6 text-center">
                <h2 class="text-xl font-bold text-white tracking-wide">รายชื่อนักเรียนคนเก่ง (31 คน)</h2>
            </div>
            
            <div id="student-list" class="p-4 md:p-8 space-y-4">
                <!-- รายชื่อจะถูกใส่ด้วย JS -->
            </div>
        </main>

        <!-- Footer / Admin Link -->
        <div class="text-center mt-8 mb-24">
            <a href="admin.html" class="text-amber-700 font-medium hover:underline">⚙️ สำหรับ Admin (ดูสถิติ)</a>
        </div>

        <!-- Floating Button -->
        <div class="fixed bottom-10 left-0 right-0 flex justify-center px-4">
            <button onclick="submitAll()" id="main-btn" 
                class="save-btn text-white text-xl font-bold py-5 px-14 rounded-full shadow-2xl flex items-center space-x-3">
                <span id="btn-text">บันทึกข้อมูลทั้งหมด ✨</span>
            </button>
        </div>
    </div>

    <script>
        // ใช้ URL เว็บแอปของคุณที่ได้จากการ Deploy ล่าสุด
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyFZexysD3DmnEbcJ0vaTq8WvRgr5p_rpvCXSDnwWJXAsB8lgzoq4SKNTnJNBggi_Q2/exec";

        const students = ["นายเจษฎา ใจอินทร์", "นายภาคภูมิ จันทร์สี", "นายอนุวัฒน์ อ่อนกระโทก", "นางสาวกชนันท์ ธุมา", "นางสาวกมลวรรณ พันทอง", "นางสาวดวงกมล ปวุตตานนท์", "นางสาวขวัญจิรา อินทะนิล", "นางสาวพรพิมล นวลงิ้ว", "นางสาวฟ้าใส ยืนยง", "นางสาววรางคณา โฉมศรี", "นางสาวศศิณา สุวรรณประทีป", "นางสาวสุกัญญา อินจันทร์", "นางสาวสุภาพร ดาวเรือง", "นางสาวเสาวลักษณ์ คำดี", "นางสาวหยาดนรินทร์ เพชรนิล", "นางสาวอรพรรณ เพ็ญเขตร์กร", "นายปรเมธ เสียงเสนาะ", "นายตะวันส่อง ศิริเวช", "นายพิชิต ชัยเกตุ", "นายรัชพล บุญสำรี", "นายธีรพัฒ สังข์เดช", "นายพีรพัฒน์ ไกกาศ", "นางสาวชนัญชิดา โสภาพล", "นางสาวภาวิดา เทวรักษ์ษากูล", "นางสาวบุษกร ศุภลักษณ์", "นางสาวมนัสนันท์ อ่ำเฮง", "นางสาวสุทธิกานต์ แก้วจุ้ย", "นายสุริยะ ศรีนวล", "นายอชิตะ ขอนแก่น", "นายรพีภัทร อยู่ดี", "นายธนพร ชวนทิศ"];

        window.onload = () => {
            const now = new Date();
            const dateStr = `วัน${["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"][now.getDay()]}ที่ ${now.getDate()} ${["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"][now.getMonth()]} พ.ศ. ${now.getFullYear()+543}`;
            document.getElementById('thai-date').innerText = dateStr;

            const list = document.getElementById('student-list');
            students.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = "status-row bg-white/50 p-4 rounded-3xl flex items-center justify-between border border-amber-50 animate-pop";
                div.style.animationDelay = `${i * 0.04}s`;
                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="bg-amber-200 text-amber-700 w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold">${i+1}</span>
                        <span class="font-medium text-amber-900">${name}</span>
                    </div>
                    <select id="s-${i}" class="bg-white border-2 border-amber-100 rounded-2xl px-3 py-2 text-sm font-bold text-amber-700 outline-none focus:border-amber-400 cursor-pointer">
                        <option value="มา">✅ มา</option>
                        <option value="ขาด">❌ ขาด</option>
                        <option value="สาย">🕒 สาย</option>
                        <option value="ลากิจ">📝 ลากิจ</option>
                        <option value="ลาป่วย">🏥 ลาป่วย</option>
                    </select>
                `;
                list.appendChild(div);
            });
        };

        async function submitAll() {
            const btn = document.getElementById('main-btn');
            const btnText = document.getElementById('btn-text');
            
            // ดึงค่าเฉพาะ "ข้อความสถานะ" (ตัด Emoji ออกเพื่อให้ตรงกับ Apps Script)
            const attendees = students.map((name, i) => {
                const fullValue = document.getElementById(`s-${i}`).value;
                return { name: name, status: fullValue };
            });

            if (!confirm("บันทึกข้อมูลของเด็กๆ ทั้ง 31 คนเลยไหมคะ? ✨")) return;

            btn.disabled = true;
            btnText.innerText = "กำลังส่งข้อมูลน้าา... 🚀";
            btn.style.opacity = "0.7";

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญสำหรับการส่งข้าม Domain
                    body: JSON.stringify({ 
                        date: document.getElementById('thai-date').innerText, 
                        attendees: attendees 
                    })
                });

                // บันทึกสำเร็จ: เปลี่ยนสีปุ่มเป็นชมพู
                btnText.innerText = "บันทึกสำเร็จแล้วจ้าา! ❤️";
                btn.style.background = "linear-gradient(to right, #ec4899, #db2777)";
                
                setTimeout(() => {
                    btn.disabled = false;
                    btnText.innerText = "บันทึกข้อมูลทั้งหมด ✨";
                    btn.style.background = "linear-gradient(to right, #fbbf24, #f59e0b)";
                    btn.style.opacity = "1";
                }, 4000);

            } catch (e) {
                console.error(e);
                alert("อุ๊ย! มีบางอย่างผิดพลาด ลองใหม่อีกทีนะคะ");
                btn.disabled = false;
                btnText.innerText = "ลองอีกครั้ง 🔄";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
