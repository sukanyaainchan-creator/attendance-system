<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance | ระบบเช็คชื่อปุ่มเดียว</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f0f7ff; }
        .sticky-btn { position: sticky; bottom: 20px; z-index: 40; }
    </style>
</head>
<body class="pb-24">
    <nav class="bg-blue-600 text-white p-5 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Smart Check-in</h1>
            <div id="thai-date-display" class="bg-blue-700 px-4 py-2 rounded-lg text-sm border border-blue-400"></div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- Date Display Card -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border-l-8 border-blue-500 mb-8 flex justify-between items-center">
            <div>
                <p class="text-blue-600 text-sm font-semibold uppercase">บันทึกข้อมูลประจำวันที่</p>
                <h2 id="display-date" class="text-2xl font-bold text-gray-800"></h2>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400">สถานะ: พร้อมบันทึก</p>
            </div>
        </div>

        <!-- Student Table -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 mb-10">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-blue-600 text-white text-center">
                        <tr>
                            <th class="p-5 w-20">ลำดับ</th>
                            <th class="p-5 text-left">ชื่อ-นามสกุล</th>
                            <th class="p-5">เลือกสถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="student-list" class="divide-y divide-gray-50 text-center">
                        <!-- รายชื่อจะขึ้นตรงนี้ -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ปุ่มบันทึกปุ่มเดียว (Sticky Button) -->
        <div class="flex justify-center sticky-btn">
            <button onclick="submitAllData()" id="save-all-btn" class="bg-blue-600 hover:bg-blue-700 text-white text-xl font-bold px-12 py-5 rounded-full shadow-2xl transition-all active:scale-95 flex items-center space-x-3">
                <span>บันทึกข้อมูลทั้งหมดลง Sheets</span>
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // *** 1. นำ URL ของ Web App มาใส่ตรงนี้ ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4hdruaPqbj5OuDT6OWRWXnv11sFG9sP_D-0aFLraSzSNBu2g7Q1EJmasbTOnS5FEv/exec";

        const students = [
            "นายเจษฎา ใจอินทร์", "นายภาคภูมิ จันทร์สี", "นายอนุวัฒน์ อ่อนกระโทก", "นางสาวกชนันท์ ธุมา",
            "นางสาวกมลวรรณ พันทอง", "นางสาวดวงกมล ปวุตตานนท์", "นางสาวขวัญจิรา อินทะนิล", "นางสาวพรพิมล นวลงิ้ว",
            "นางสาวฟ้าใส ยืนยง", "นางสาววรางคณา โฉมศรี", "นางสาวศศิณา สุวรรณประทีป", "นางสาวสุกัญญา อินจันทร์",
            "นางสาวสุภาพร ดาวเรือง", "นางสาวเสาวลักษณ์ คำดี", "นางสาวหยาดนรินทร์ เพชรนิล", "นางสาวอรพรรณ เพ็ญเขตร์กร",
            "นายปรเมธ เสียงเสนาะ", "นายตะวันส่อง ศิริเวช", "นายพิชิต ชัยเกตุ", "นายรัชพล บุญสำรี",
            "นายธีรพัฒ สังข์เดช", "นายพีรพัฒน์ ไกกาศ", "นางสาวชนัญชิดา โสภาพล", "นางสาวภาวิดา เทวรักษ์ษากูล",
            "นางสาวบุษกร ศุภลักษณ์", "นางสาวมนัสนันท์ อ่ำเฮง", "นางสาววันวิสา เจริญศิลป์", "นางสาวสุทธิกานต์ แก้วจุ้ย",
            "นายสุริยะ ศรีนวล", "นายอชิตะ ขอนแก่น", "นายรพีภัทร อยู่ดี", "นายธนพร ชวนทิศ"
        ];

        function getThaiDate() {
            const now = new Date();
            const days = ["อาทิตย์", "จันทร์", "อังคาร", "พุธ", "พฤหัสบดี", "ศุกร์", "เสาร์"];
            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            return `วัน${days[now.getDay()]}ที่ ${now.getDate()} ${months[now.getMonth()]} พ.ศ. ${now.getFullYear() + 543}`;
        }

        window.onload = function() {
            const dateStr = getThaiDate();
            document.getElementById('thai-date-display').innerText = dateStr;
            document.getElementById('display-date').innerText = dateStr;

            const list = document.getElementById('student-list');
            students.forEach((name, i) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-5 text-gray-400 font-medium">${i+1}</td>
                    <td class="p-5 font-semibold text-gray-700 text-left">${name}</td>
                    <td class="p-5">
                        <select id="status-${i}" class="bg-gray-50 border border-blue-100 rounded-xl p-2 px-4 text-sm outline-none cursor-pointer focus:ring-2 focus:ring-blue-400">
                            <option value="มา">มา</option>
                            <option value="ขาด">ขาด</option>
                            <option value="สาย">สาย</option>
                            <option value="ลากิจ">ลากิจ</option>
                            <option value="ลาป่วย">ลาป่วย</option>
                        </select>
                    </td>
                `;
                list.appendChild(tr);
            });
        };

        async function submitAllData() {
            const btn = document.getElementById('save-all-btn');
            const date = document.getElementById('thai-date-display').innerText;
            const payload = [];

            // รวบรวมข้อมูลทุกคน
            students.forEach((name, i) => {
                const status = document.getElementById(`status-${i}`).value;
                payload.push({ name: name, status: status });
            });

            if(!confirm("ยืนยันการบันทึกข้อมูลของนักเรียนทั้ง 32 คน?")) return;

            btn.disabled = true;
            btn.innerText = "กำลังบันทึกข้อมูลทั้งหมด...";
            btn.classList.replace('bg-blue-600', 'bg-gray-400');

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ date: date, attendees: payload })
                });
                alert("บันทึกข้อมูลทั้ง 32 คนเรียบร้อยแล้ว!");
                btn.innerText = "บันทึกสำเร็จเรียบร้อย ✅";
                btn.classList.replace('bg-gray-400', 'bg-green-500');
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ");
                btn.disabled = false;
                btn.innerText = "ลองบันทึกอีกครั้ง";
                btn.classList.replace('bg-gray-400', 'bg-blue-600');
            }
        }
    </script>
</body>
</html>
